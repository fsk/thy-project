services:
  postgres:
    image: postgres:16-alpine
    container_name: thy-postgres
    environment:
      POSTGRES_DB: thy
      POSTGRES_USER: thy
      POSTGRES_PASSWORD: thy
    ports:
      - "5434:5432"
    volumes:
      - thy-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thy -d thy"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thy-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: thy
      DB_USER: thy
      DB_PASSWORD: thy
      PORT: "8080"
    ports:
      - "8080:8080"

volumes:
  thy-postgres-data:
