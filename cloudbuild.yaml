steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/backend',
        '-f',
        'backend/Dockerfile',
        'backend'
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/backend'
      ]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'thy-project',
        '--image',
        'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/backend',
        '--region',
        'europe-west1',
        '--platform',
        'managed',
        '--allow-unauthenticated'
      ]

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/backend'

options:
  logging: CLOUD_LOGGING_ONLY